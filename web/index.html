<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>주거 후보 매물 지도</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
    #app { display: flex; flex-direction: column; height: 100%; }
    header {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 16px; background: #1f2937; color: #fff; flex: 0 0 auto;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    .toggle { display: inline-flex; border: 1px solid #4b5563; border-radius: 8px; overflow: hidden; }
    .toggle button {
      border: 0; background: #374151; color: #d1d5db; padding: 7px 16px;
      font-size: 14px; cursor: pointer; font-weight: 600;
    }
    .toggle button.active { background: #3b82f6; color: #fff; }
    .count { font-size: 13px; color: #9ca3af; margin-left: auto; }
    #map { flex: 1 1 auto; }
    #notice {
      display: none; padding: 14px 16px; background: #fef3c7; color: #92400e;
      font-size: 14px; line-height: 1.6; border-bottom: 1px solid #fde68a;
    }
    /* DOM 핀(CustomOverlay) — CSS :hover로 툴팁 제어 */
    .pin { cursor: pointer; line-height: 0; position: relative; }
    .pin img { display: block; filter: drop-shadow(0 1px 2px rgba(0,0,0,.35));
               transform-origin: bottom center; transition: transform .08s ease; }
    .pin:hover img { transform: scale(1.15); }
    /* 마커 호버 툴팁: 핀의 자식, 핀 위에 절대배치, 기본 숨김 → 깜빡임 없음 */
    .tip {
      position: absolute; left: 50%; bottom: 100%; transform: translateX(-50%);
      margin-bottom: 10px; min-width: 160px; max-width: 260px;
      background: #fff; border: 1px solid #d1d5db; border-radius: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,.18); padding: 10px 12px;
      font-size: 12.5px; line-height: 1.5; color: #1f2937; text-align: left;
      pointer-events: none;   /* 호버 영역에 영향 주지 않음 */
      opacity: 0; visibility: hidden; transition: opacity .1s ease; z-index: 5;
    }
    .pin:hover .tip { opacity: 1; visibility: visible; }
    .tip .tname { font-weight: 700; font-size: 13.5px; margin-bottom: 5px; }
    .tip .trow { color: #374151; }
    .tip .tlabel { color: #6b7280; }
    .tip .tarrow {
      position: absolute; left: 50%; bottom: -7px; transform: translateX(-50%);
      width: 12px; height: 12px; background: #fff;
      border-right: 1px solid #d1d5db; border-bottom: 1px solid #d1d5db;
      rotate: 45deg;
    }
    .tip .thint { margin-top: 6px; color: #3b82f6; font-size: 11.5px; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>주거 후보 매물 지도</h1>
      <div class="toggle">
        <button id="btn-sale" class="active" data-type="sale">매매</button>
        <button id="btn-rent" data-type="rent">월세 / 전세</button>
      </div>
      <span class="count" id="count"></span>
    </header>
    <div id="notice"></div>
    <div id="map"></div>
  </div>

  <!-- 카카오 JS 키(시크릿). web/map_key.js 는 .gitignore. window.KAKAO_JS_KEY 정의 -->
  <script src="map_key.js" onerror="window.__noKey=true"></script>
  <script src="app.js"></script>
  <script>
    // 카카오 지도 SDK를 키와 함께 동적 로드(autoload=false) 후 앱 초기화
    (function () {
      var notice = document.getElementById('notice');
      function fail(msg) { notice.style.display = 'block'; notice.innerHTML = msg; }
      if (window.__noKey || !window.KAKAO_JS_KEY) {
        fail('카카오 JavaScript 키가 없습니다. <b>web/map_key.js</b> 파일을 만들고 ' +
             '<code>window.KAKAO_JS_KEY = "발급받은 JS 키";</code> 한 줄을 넣어주세요. ' +
             '(카카오 개발자 콘솔 → 내 애플리케이션 → 앱 키 → JavaScript 키, ' +
             '플랫폼 Web 도메인에 <code>http://localhost:8000</code> 등록)');
        return;
      }
      var s = document.createElement('script');
      s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' +
              window.KAKAO_JS_KEY + '&autoload=false';
      s.onload = function () { kakao.maps.load(window.initApp); };
      s.onerror = function () { fail('카카오 지도 SDK 로드 실패. 네트워크/도메인 등록을 확인하세요.'); };
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
